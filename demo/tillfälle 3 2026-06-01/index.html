<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <script src="script/script.js" defer></script>
    </head>
    <body>
        <h1>Apoteketskölista:</h1>
        <div id="display"></div>
        <button
            onclick="
                queue.shift()
                divDOM.innerHTML = ''
                for (let i = 0; i < queue.length; i++)
                    divDOM.innerHTML +=
                        queue[i] + ' är på köplats: ' + (i+1) + '<br>'
            "
        >
            nästa person
        </button>
        <br />
        <input type="text" id="namn" />
        <button
            onclick="
                queue.push(document.getElementById('namn').value)
                divDOM.innerHTML = ''
                for (let i = 0; i < queue.length; i++)
                    divDOM.innerHTML +=
                        queue[i] + ' är på köplats: ' + (i+1)  + '<br>'
            "
        >
            lägg till i kön
        </button>
    </body>
</html>
